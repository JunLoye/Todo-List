<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net">
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Todo List</h1>
    </header>

    <div class="main-container">
      <!-- 左侧边栏 -->
      <aside class="sidebar">
        <div class="stats">
          <div class="stat-card">
            <span class="stat-label">全部</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">进行中</span>
            <span class="stat-value" id="activeCount">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">已完成</span>
            <span class="stat-value" id="completedCount">0</span>
          </div>
        </div>

        <div class="filter-group">
          <button data-filter="all" class="filter-btn active">全部</button>
          <button data-filter="active" class="filter-btn">进行中</button>
          <button data-filter="completed" class="filter-btn">已完成</button>
        </div>

        <div class="action-group">
          <button id="clearCompletedBtn" class="secondary-btn">清除已完成</button>
          <button id="exportBtn" class="secondary-btn">导出数据</button>
          <button id="settingsBtn" class="secondary-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.07.09A10 10 0 0 0 12 18a10 10 0 0 0 6.18-2.22l.07-.09z" />
              <path d="M4.6 9a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H18.22a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.07-.09A10 10 0 0 0 12 6a10 10 0 0 0-6.18 2.22z" />
            </svg>
            设置
          </button>
        </div>
      </aside>

      <!-- 右侧主要内容 -->
      <main class="content">
        <div class="add-task-area">
          <div class="add-task-row">
            <input type="text" id="taskInput" placeholder="任务名称..." autocomplete="off">
            <input type="date" id="dueDateInput" placeholder="截止日期">
            <button id="addBtn" class="primary-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              添加
            </button>
          </div>
        </div>

        <div class="sort-bar">
          <span class="sort-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M6 12h12M10 18h4" />
            </svg>
            排序：
          </span>
          <select id="sortSelect" class="sort-select">
            <option value="dateDesc">创建时间（新→旧）</option>
            <option value="dateAsc">创建时间（旧→新）</option>
            <option value="dueDateAsc">截止日期（近→远）</option>
            <option value="dueDateDesc">截止日期（远→近）</option>
          </select>
        </div>

        <div class="todo-list-container">
          <ul id="todoList" class="todo-list">
            <li class="empty-placeholder">暂无任务，输入第一条任务开始</li>
          </ul>
        </div>
      </main>
    </div>
  </div>

  <!-- 编辑任务模态框 -->
  <dialog id="editModal" class="modal">
    <div class="modal-content">
      <h3>编辑任务</h3>
      <input type="text" id="editTitle" placeholder="任务名称">
      <input type="date" id="editDueDate">
      <div class="modal-buttons">
        <button id="saveEditBtn" class="primary-btn">保存</button>
        <button id="closeModalBtn" class="secondary-btn">取消</button>
      </div>
    </div>
  </dialog>
  
  <!-- 设置模态框（无 Emoji） -->
  <dialog id="settingsModal" class="modal settings-modal">
    <div class="modal-content">
      <h3>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.07.09A10 10 0 0 0 12 18a10 10 0 0 0 6.18-2.22l.07-.09z" />
          <path d="M4.6 9a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H18.22a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.07-.09A10 10 0 0 0 12 6a10 10 0 0 0-6.18 2.22z" />
        </svg>
        设置
      </h3>
      <div class="settings-item">
        <label class="settings-label">
          <span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; vertical-align: middle;">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
            深色模式
          </span>
          <div class="toggle-switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="toggle-slider"></span>
          </div>
        </label>
      </div>
      <div class="settings-item">
        <label class="settings-label">
          <span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            启用截止日期功能
          </span>
          <div class="toggle-switch">
            <input type="checkbox" id="dueDateEnableToggle">
            <span class="toggle-slider"></span>
          </div>
        </label>
        <p class="settings-hint">关闭后将隐藏截止日期输入框及任务中的日期信息</p>
      </div>
      <div class="settings-item">
        <div class="update-info">
          <span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            当前版本: <span id="currentVersion">1.1.0</span>
          </span>
          <button id="checkUpdateBtn" class="secondary-btn" style="width: auto; padding: 6px 16px;">检查更新</button>
        </div>
      </div>
      <div class="modal-buttons" style="margin-top: 16px;">
        <button id="closeSettingsBtn" class="primary-btn">关闭</button>
      </div>
    </div>
  </dialog>

  <!-- 自定义通用弹窗 -->
  <dialog id="customDialog" class="custom-dialog">
    <div class="dialog-content">
      <div class="dialog-icon" id="dialogIcon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path id="dialogIconPath" d="M12 8v4m0 4h.01M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z" />
        </svg>
      </div>
      <p id="dialogMessage">消息内容</p>
      <div class="dialog-buttons">
        <button id="dialogConfirmBtn" class="primary-btn">确定</button>
        <button id="dialogCancelBtn" class="secondary-btn" style="display: none;">取消</button>
      </div>
    </div>
  </dialog>

  <script src="renderer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</body>
</html>
